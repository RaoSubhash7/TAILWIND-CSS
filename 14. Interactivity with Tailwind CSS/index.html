<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="output.css" rel="stylesheet">
    <title>Interactivity with Tailwind CSS</title>
</head>

<body>
    <button class="bg-blue-500 m-4 p-4 hover:bg-blue-700 rounded text-white hover:text-gray-300  block">
        Click me
    </button>

    <button
        class="bg-blue-500 m-4 p-4 hover:bg-blue-700 rounded text-white hover:text-gray-300  block focus:bg-yellow-900 ">
        Click me
    </button>
    <button class="bg-blue-500 m-4 p-4 hover:bg-blue-700 rounded text-white  block active:bg-green-500">
        Click me
    </button>

    <div>
        <a href="#" class="group">
            <h2 class="group-hover:text-blue-500">
                lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate!
            </h2>
            <p class="group-hover:text-red-700">
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate!
            </p>
        </a>
    </div>
</body>

</html>
